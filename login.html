<!DOCTYPE html>
<html lang="en">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <title>Login — CrowdSense AI</title>
    <!-- Tailwind CSS CDN for the gaming-login UI -->
    <script src="https://cdn.tailwindcss.com"></script>
    <link href="https://fonts.googleapis.com/css2?family=Inter:wght@300;400;500;600;700&display=swap" rel="stylesheet">
    <link rel="stylesheet" href="style.css">
    <style>
        body { font-family: 'Inter', sans-serif; background: #000; }
        .animate-fadeIn { animation: fadeIn 0.8s ease-out forwards; }
        @keyframes fadeIn { from { opacity: 0; transform: translateY(10px); } to { opacity: 1; transform: translateY(0); } }
        .animate-pulse { animation: pulse 2s cubic-bezier(0.4, 0, 0.6, 1) infinite; }
        @keyframes pulse { 0%, 100% { opacity: 1; } 50% { opacity: .5; } }
        .sr-only { position: absolute; width: 1px; height: 1px; padding: 0; margin: -1px; overflow: hidden; clip: rect(0, 0, 0, 0); white-space: nowrap; border-width: 0; }
    </style>
</head>
<body class="relative min-h-screen w-full flex items-center justify-center px-4 py-12 overflow-hidden">

    <!-- Video Background -->
    <div class="absolute inset-0 w-full h-full overflow-hidden">
        <div class="absolute inset-0 bg-black/40 z-10"></div>
        <video class="absolute inset-0 min-w-full min-h-full object-cover w-auto h-auto" autoPlay loop muted playsInline>
            <source src="https://videos.pexels.com/video-files/8128311/8128311-uhd_2560_1440_25fps.mp4" type="video/mp4">
        </video>
    </div>

    <!-- Auth Container -->
    <div class="relative z-20 w-full max-w-md animate-fadeIn">
        
        <!-- Login Form (Default View) -->
        <div id="login-section" class="p-8 rounded-2xl backdrop-blur-md bg-black/50 border border-white/10 shadow-2xl">
            <div class="mb-8 text-center">
                <h2 class="text-3xl font-bold mb-2 relative group inline-block">
                    <span class="absolute -inset-1 bg-gradient-to-r from-purple-600/30 via-pink-500/30 to-blue-500/30 blur-xl opacity-75 group-hover:opacity-100 transition-all duration-500 animate-pulse"></span>
                    <span class="relative inline-block text-3xl font-bold mb-2 text-white">CrowdSense AI</span>
                </h2>
                <p class="text-white/80 flex flex-col items-center space-y-1">
                    <span class="relative inline-block animate-pulse">Your venue navigation universe</span>
                    <span class="text-xs text-white/50">[Log in to access live crowd data]</span>
                </p>
            </div>

            <form id="login-form" class="space-y-6">
                <!-- Username -->
                <div class="relative">
                    <div class="absolute left-3 top-1/2 -translate-y-1/2 text-white/60">
                        <svg xmlns="http://www.w3.org/2000/svg" width="18" height="18" viewBox="0 0 24 24" fill="none" stroke="currentColor" stroke-width="2" stroke-linecap="round" stroke-linejoin="round" class="lucide lucide-mail"><rect width="20" height="16" x="2" y="4" rx="2"/><path d="m22 7-8.97 5.7a1.94 1.94 0 0 1-2.06 0L2 7"/></svg>
                    </div>
                    <input type="text" id="login-email" placeholder="Enter username" required
                        class="w-full pl-10 pr-3 py-2 bg-white/5 border border-white/10 rounded-lg text-white placeholder-white/60 focus:outline-none focus:border-purple-500/50 transition-colors">
                </div>

                <!-- Password -->
                <div class="relative">
                    <div class="absolute left-3 top-1/2 -translate-y-1/2 text-white/60">
                        <svg xmlns="http://www.w3.org/2000/svg" width="18" height="18" viewBox="0 0 24 24" fill="none" stroke="currentColor" stroke-width="2" stroke-linecap="round" stroke-linejoin="round" class="lucide lucide-lock"><rect width="18" height="11" x="3" y="11" rx="2" ry="2"/><path d="M7 11V7a5 5 0 0 1 10 0v4"/></svg>
                    </div>
                    <input type="password" id="login-password" placeholder="Password" required
                        class="w-full pl-10 pr-3 py-2 bg-white/5 border border-white/10 rounded-lg text-white placeholder-white/60 focus:outline-none focus:border-purple-500/50 transition-colors">
                </div>

                <div id="login-error" class="text-red-500 text-xs hidden"></div>

                <button type="submit" id="login-btn"
                    class="w-full py-3 rounded-lg bg-purple-600 hover:bg-purple-700 text-white font-medium transition-all duration-200 ease-in-out transform hover:-translate-y-1 shadow-lg shadow-purple-500/20">
                    Enter Dashboard
                </button>
            </form>

            <p class="mt-8 text-center text-sm text-white/60">
                Need an account? <a href="#" onclick="toggleAuth('signup')" class="font-medium text-white hover:text-purple-300 transition-colors">Create ID</a>
            </p>
        </div>

        <!-- Signup Form (Hidden by Default) -->
        <div id="signup-section" class="p-8 rounded-2xl backdrop-blur-md bg-black/50 border border-white/10 shadow-2xl hidden">
            <div class="mb-8 text-center">
                <h2 class="text-3xl font-bold mb-2 text-white">Create Account</h2>
                <p class="text-white/60 text-sm">Choose your ID and password</p>
            </div>

            <form id="signup-form" class="space-y-4">
                <input type="text" id="signup-email" placeholder="Create a username" required
                    class="w-full px-4 py-2 bg-white/5 border border-white/10 rounded-lg text-white focus:outline-none focus:border-purple-500/50">
                <input type="password" id="signup-password" placeholder="Create Password" required
                    class="w-full px-4 py-2 bg-white/5 border border-white/10 rounded-lg text-white focus:outline-none focus:border-purple-500/50">
                
                <div id="signup-error" class="text-red-500 text-xs hidden"></div>

                <button type="submit" id="signup-btn"
                    class="w-full py-3 rounded-lg bg-purple-600 hover:bg-purple-700 text-white font-medium shadow-lg shadow-purple-500/20">
                    Create My Account
                </button>
            </form>

            <p class="mt-8 text-center text-sm text-white/60">
                Back to <a href="#" onclick="toggleAuth('login')" class="font-medium text-white hover:text-purple-300 transition-colors">Login</a>
            </p>
        </div>
    </div>

    <!-- Custom Scripts -->
    <script src="https://www.gstatic.com/firebasejs/9.23.0/firebase-app-compat.js"></script>
    <script src="https://www.gstatic.com/firebasejs/9.23.0/firebase-auth-compat.js"></script>
    <script src="https://www.gstatic.com/firebasejs/9.23.0/firebase-database-compat.js"></script>
    <script src="firebase-config.js"></script>
    <script src="auth.js"></script>

    <script>
        // Toggle between Login and Signup
        function toggleAuth(type) {
            const loginSection = document.getElementById('login-section');
            const signupSection = document.getElementById('signup-section');
            if (type === 'signup') {
                loginSection.classList.add('hidden');
                signupSection.classList.remove('hidden');
            } else {
                loginSection.classList.remove('hidden');
                signupSection.classList.add('hidden');
            }
        }

        // Handle Login Submission
        document.getElementById('login-form').addEventListener('submit', (e) => {
            e.preventDefault();
            const email = document.getElementById('login-email').value;
            const pass = document.getElementById('login-password').value;
            login(email, pass);
        });

        // Handle Signup Submission
        document.getElementById('signup-form').addEventListener('submit', (e) => {
            e.preventDefault();
            const email = document.getElementById('signup-email').value;
            const pass = document.getElementById('signup-password').value;
            signUp(email, pass);
        });
    </script>
</body>
</html>
