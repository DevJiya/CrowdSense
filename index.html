<!DOCTYPE html>
<html lang="en">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <!-- Security: Content Security Policy & XSS Protection -->
    <meta http-equiv="Content-Security-Policy" content="default-src 'self' https: 'unsafe-inline' 'unsafe-eval' data:; img-src 'self' https: data:; frame-src https://maps.google.com https://www.google.com;">
    
    <title>CrowdSense AI | Professional Stadium Intelligence</title>
    
    <!-- External Modular Assets -->
    <link rel="stylesheet" href="style.css">
    
    <!-- External UI Frameworks -->
    <script src="https://cdn.tailwindcss.com"></script>
    <script src="https://unpkg.com/lucide@latest"></script>
</head>
<body class="h-screen flex flex-col">

    <!-- Header & Navigation -->
    <header class="h-16 border-b border-[#222224] flex items-center justify-between px-6 bg-[#0A0A0B] shrink-0 z-50" role="banner">
        <div class="flex items-center gap-6">
            <div class="flex items-center gap-2">
                <div class="w-7 h-7 bg-[#185FA5] rounded-lg flex items-center justify-center font-bold text-sm italic">CS</div>
                <span class="font-extrabold tracking-tighter text-sm uppercase">CrowdSense <span class="text-zinc-500 font-medium">Pro Intelligence</span></span>
            </div>
            <div class="relative ml-4">
                <i data-lucide="search" class="absolute left-3 top-1/2 -translate-y-1/2 w-4 h-4 text-zinc-500"></i>
                <input type="text" id="global-search" placeholder="Search & Register Target Stadium..." 
                       class="search-input" aria-label="Search and register new stadium nodes"
                       onkeydown="if(event.key==='Enter') CORE.handleSearch(this.value)">
            </div>
        </div>
        
        <nav class="flex gap-2" id="main-nav" role="navigation"></nav>

        <div class="flex items-center gap-6">
            <div id="diag-indicator" class="flex items-center gap-2 px-3 py-1 bg-green-500/10 border border-green-500/30 rounded">
                <div class="w-1.5 h-1.5 bg-green-500 rounded-full animate-pulse"></div>
                <span class="text-[9px] font-black uppercase tracking-widest text-green-500">System Nominal</span>
            </div>
            <div id="clock" class="text-[11px] font-bold text-zinc-500 font-mono tracking-widest">00:00:00 IST</div>
        </div>
    </header>

    <!-- Main Intelligence Feed -->
    <main class="flex-1 overflow-hidden p-6 flex flex-col gap-6" role="main">
        <div id="tab-content" class="flex-1 overflow-hidden"></div>
    </main>

    <!-- Notification Stack -->
    <div id="toast-container" class="fixed top-20 right-6 z-[1000] flex flex-col gap-4 pointer-events-none"></div>

    <!-- Core Application Logic -->
    <script src="script.js"></script>
</body>
</html>
