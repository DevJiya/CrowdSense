steps:
  # Step 1: Install dependencies
  - name: 'node:18-slim'
    entrypoint: 'npm'
    args: ['install']

  # Step 2: Run tests
  - name: 'node:18-slim'
    entrypoint: 'npm'
    args: ['test']

  # Step 3: Build Docker image
  - name: 'gcr.io/cloud-builders/docker'
    args: ['build', '-t', 'gcr.io/$PROJECT_ID/crowdsense', '.']

  # Step 4: Push Docker image
  - name: 'gcr.io/cloud-builders/docker'
    args: ['push', 'gcr.io/$PROJECT_ID/crowdsense']

  # Step 5: Deploy to Cloud Run
  - name: 'gcr.io/google.com/cloudsdktool/cloud-sdk'
    entrypoint: 'gcloud'
    args:
      - 'run'
      - 'deploy'
      - 'crowdsense'
      - '--image'
      - 'gcr.io/$PROJECT_ID/crowdsense'
      - '--region'
      - 'us-central1'
      - '--allow-unauthenticated'

images:
  - 'gcr.io/$PROJECT_ID/crowdsense'
